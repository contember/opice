name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Which CF environment to deploy to
        options: [stage, prod]
        default: stage

concurrency:
  # Serialize deploys per target — prevents racing oblaka state writes.
  group: deploy-${{ github.event.inputs.environment || 'stage' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'stage' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPICE_READ_TOKEN: ${{ secrets.OPICE_READ_TOKEN }}
      OPICE_ADMIN_TOKEN: ${{ secrets.OPICE_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build dashboard SPA
        working-directory: packages/dashboard
        run: bun run build

      - name: Deploy worker + provision D1/R2
        working-directory: packages/worker
        env:
          CLOUDFLARE_ENV: ${{ steps.target.outputs.env }}
        run: bunx oblaka oblaka.ts --env=${{ steps.target.outputs.env }} --remote

      - name: Apply D1 migrations
        working-directory: packages/worker
        run: bunx wrangler d1 migrations apply opice --remote

      - name: Summary
        run: |
          echo "### Deployed opice to **${{ steps.target.outputs.env }}** :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
