name: Deploy

on:
  push:
    branches:
      # main → stage auto-deploy is OFF — stage is currently broken and every
      # main push went red. Re-add `- main` here once stage is fixed; until then
      # deploy stage on demand via workflow_dispatch (environment=stage).
      - deploy/prod  # → prod
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Which CF environment to deploy to
        options: [stage, prod]
        default: stage

concurrency:
  # Serialize deploys per target so oblaka's KV state never races.
  group: deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/deploy/prod' && 'prod' || 'stage') }}
  cancel-in-progress: false

# Deploy talks to Cloudflare via CLOUDFLARE_API_TOKEN, not the GitHub token.
# The job only needs to read the repo; the `environment:` deployment record
# is managed by the Actions backend, not the workflow token.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/deploy/prod' && 'prod' || 'stage') }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v5
        # wrangler still launches under Node when invoked via bunx, and it
        # requires Node 22+. The runner's default is 20.
        with:
          node-version: '24'

      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/deploy/prod" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build dashboard SPA
        working-directory: packages/dashboard
        run: bun run build

      - name: Provision D1/R2 + write wrangler.jsonc
        working-directory: packages/worker
        env:
          CLOUDFLARE_ENV: ${{ steps.target.outputs.env }}
          # Per-target Custom Domain (GitHub Environment var). Unset → *.workers.dev.
          OPICE_HOSTNAME: ${{ vars.OPICE_HOSTNAME }}
        run: |
          bunx oblaka oblaka.ts \
            --env=${{ steps.target.outputs.env }} \
            --state-namespace=opice-state \
            --remote

      - name: Apply D1 migrations
        working-directory: packages/worker
        # `DB` is the binding name from oblaka-generated wrangler.jsonc; the
        # actual DB name in CF is `${env}-opice`. The binding is env-stable.
        run: |
          bunx wrangler d1 migrations apply DB --remote

      - name: Upload worker script
        working-directory: packages/worker
        run: bunx wrangler deploy

      # Reconcile opice's declared authz vocabulary (packages/worker/propustka.schema.ts) into
      # Propustka via the idempotent admin endpoint. Skipped until the operator configures the
      # PROPUSTKA_URL var (+ optional Access service token secrets) for this environment.
      - name: Reconcile Propustka authz schema
        if: ${{ vars.PROPUSTKA_URL != '' }}
        working-directory: packages/worker
        env:
          PROPUSTKA_URL: ${{ vars.PROPUSTKA_URL }}
          PROPUSTKA_ACCESS_CLIENT_ID: ${{ secrets.PROPUSTKA_ACCESS_CLIENT_ID }}
          PROPUSTKA_ACCESS_CLIENT_SECRET: ${{ secrets.PROPUSTKA_ACCESS_CLIENT_SECRET }}
        run: bun run schema:provision

      # Reconcile opice's declared Cloudflare Access edge rules (packages/worker/propustka.access.ts)
      # into Propustka — the front-door counterpart of the schema reconcile above. Same gate + auth;
      # idempotent (manages only px:<app>: policies). Needs the IAM Worker's CF token to also carry
      # Access: Apps and Policies — Edit.
      - name: Reconcile Propustka Access rules
        if: ${{ vars.PROPUSTKA_URL != '' }}
        working-directory: packages/worker
        env:
          PROPUSTKA_URL: ${{ vars.PROPUSTKA_URL }}
          PROPUSTKA_ACCESS_CLIENT_ID: ${{ secrets.PROPUSTKA_ACCESS_CLIENT_ID }}
          PROPUSTKA_ACCESS_CLIENT_SECRET: ${{ secrets.PROPUSTKA_ACCESS_CLIENT_SECRET }}
          # propustka.access.ts builds the CF Access destinations from this; the human audience is
          # propustka's central HUMAN_EMAIL_DOMAINS/HUMAN_EMAILS, not passed per app.
          OPICE_HOSTNAME: ${{ vars.OPICE_HOSTNAME }}
        run: bun run access:provision

      - name: Summary
        run: |
          echo "### Deployed opice to **${{ steps.target.outputs.env }}** :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: \`${{ github.event_name }}\` on \`${{ github.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
